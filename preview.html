<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation IA pour jeunes Algériens</title>

    <!-- Police -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #000;
            --accent-color: #3B82F6;
            --bg-color: #F3F4F6;
            --white: #fff;
            --text-main: #1F2937;
            --border-color: #E5E7EB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--bg-color);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--accent-color);
            font-weight: 600;
        }

        .banner {
            height: 240px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            background: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-secondary {
            background: black;
        }

        .download-section {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .accordion details {
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
        }

        summary {
            cursor: pointer;
            font-weight: bold;
        }

        .map-wrapper {
            height: 300px;
            margin: 40px 0;
            border-radius: 12px;
            overflow: hidden;
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            font-size: 14px;
            color: #6B7280;
        }

        @media(max-width: 600px) {
            header { flex-direction: column; text-align: center; }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/80'">
        <div>
            <h1>Formation IA pour jeunes Algériens</h1>
            <p class="subtitle">Maîtriser les technologies de demain</p>
        </div>
    </header>

    <!-- IMAGE -->
    <div class="banner">
        <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=800&q=80"
             alt="IA"
             onerror="this.src='https://via.placeholder.com/800x240'">
    </div>

    <!-- INFOS -->
    <section class="info-grid">
        <div>
            <strong>📅 Date</strong>
            <p>15 Septembre 2026</p>
        </div>
        <div>
            <strong>📍 Lieu</strong>
            <p>Centre Commercial Es Senia, Oran</p>
        </div>
    </section>

    <!-- BOUTONS -->
    <section class="download-section">
        <a href="#" class="btn">📄 Programme PDF</a>
        <a href="#" class="btn btn-secondary">📘 Livret stagiaire</a>
    </section>

    <!-- PROGRAMME -->
    <section>
        <h2>Programme</h2>
        <div id="accordion"></div>
    </section>

    <!-- CARTE -->
    <div class="map-wrapper">
        <iframe width="100%" height="100%"
            src="https://maps.google.com/maps?q=Es%20Senia%20Oran&t=&z=15&output=embed">
        </iframe>
    </div>

    <!-- FOOTER -->
    <footer>
        <p><strong>Formateur :</strong> Noreddine Stili</p>
        <p>Paris, France</p>
    </footer>

</div>

<script>
    const topics = [
        "Intro IA", "Python", "Data", "ML", "Deep Learning",
        "NLP", "Computer Vision", "Projet IA"
    ];

    const container = document.getElementById("accordion");

    for (let i = 1; i <= 30; i++) {
        const el = document.createElement("details");

        el.innerHTML = `
            <summary>Jour ${i} - ${topics[i % topics.length]}</summary>
            <p>Ateliers pratiques + théorie.</p>
        `;

        container.appendChild(el);
    }
</script>

</body>
</html>
